name: 香港六合彩預測系統手機雲端

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 13-17 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 更新開獎並重新運算
        if: github.event_name != 'push'
        shell: pwsh
        run: |
          python "香港六合彩預測系統_20260630_第16版.py" daily-update --db "香港六合彩預測系統_雲端.db" --csv "data/香港六合彩預測系統_全歷史資料.csv" --fetch-hkjc --fetch-lottolyzer --tickets 20 --site-dir site --report-dir reports --backup-dir backups
          Copy-Item -LiteralPath "site/香港六合彩預測系統_手機首頁.html" -Destination site/index.html -Force

      - name: 同步本機已產生結果
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "site/香港六合彩預測系統_手機首頁.html")) { throw "缺少手機首頁" }
          if (-not (Test-Path -LiteralPath "site/香港六合彩預測系統_手機狀態.json")) { throw "缺少手機狀態" }
          if (-not (Test-Path -LiteralPath "site/香港六合彩預測系統_完整戰報.html")) { throw "缺少完整戰報" }
          Copy-Item -LiteralPath "site/香港六合彩預測系統_手機首頁.html" -Destination site/index.html -Force

      - name: 設定 Pages
        uses: actions/configure-pages@v5

      - name: 上傳網站
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: 發布到手機雲端
        id: deployment
        uses: actions/deploy-pages@v4
